version: '3.8'

# =============================================================
#  ecopria — Infrastructure complète
#  Kafka KRaft + 8 bases MySQL + Kafka UI
# =============================================================

networks:
  ecopria-network:
    driver: bridge

volumes:
  mysql_auth_data:
  mysql_user_data:
  mysql_action_data:
  mysql_inscription_data:
  mysql_presence_data:
  mysql_recompense_data:
  mysql_admin_data:
  mysql_notification_data:
  kafka_data:

services:

  # ─────────────────────────────────────────────────────────
  #  KAFKA KRaft
  # ─────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.8.7
    container_name: kafka
    hostname: kafka
    networks:
      - ecopria-network
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      CLUSTER_ID: "ecopria-kafka-cluster-001"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────────────────────
  #  KAFKA UI
  #  Accessible sur http://localhost:8090
  # ─────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    networks:
      - ecopria-network
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "ecopria-local"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      kafka:
        condition: service_healthy

  # ─────────────────────────────────────────────────────────
  #  PHPMYADMIN — interface web pour les bases MySQL
  #  Accessible sur http://localhost:8888
  # ─────────────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    networks:
      - ecopria-network
    ports:
      - "8888:80"
    environment:
      PMA_HOSTS: mysql-auth,mysql-utilisateur,mysql-action,mysql-inscription,mysql-presence,mysql-recompense,mysql-admin,mysql-notification
      PMA_USER: ecopria
      PMA_PASSWORD: ${MYSQL_PASSWORD}

  # ─────────────────────────────────────────────────────────
  #  BASES DE DONNÉES MySQL — une par microservice
  # ─────────────────────────────────────────────────────────
  mysql-auth:
    image: mysql:8.0
    container_name: mysql-auth
    networks:
      - ecopria-network
    ports:
      - "3316:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: db_auth
      MYSQL_USER: ecopria
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_auth_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mysql-utilisateur:
    image: mysql:8.0
    container_name: mysql-utilisateur
    networks:
      - ecopria-network
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: db_utilisateur
      MYSQL_USER: ecopria
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_user_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mysql-action:
    image: mysql:8.0
    container_name: mysql-action
    networks:
      - ecopria-network
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: db_action
      MYSQL_USER: ecopria
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_action_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mysql-inscription:
    image: mysql:8.0
    container_name: mysql-inscription
    networks:
      - ecopria-network
    ports:
      - "3309:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: db_inscription
      MYSQL_USER: ecopria
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_inscription_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mysql-presence:
    image: mysql:8.0
    container_name: mysql-presence
    networks:
      - ecopria-network
    ports:
      - "3310:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: db_presence
      MYSQL_USER: ecopria
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_presence_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mysql-recompense:
    image: mysql:8.0
    container_name: mysql-recompense
    networks:
      - ecopria-network
    ports:
      - "3311:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: db_recompense
      MYSQL_USER: ecopria
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_recompense_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mysql-admin:
    image: mysql:8.0
    container_name: mysql-admin
    networks:
      - ecopria-network
    ports:
      - "3312:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: db_admin
      MYSQL_USER: ecopria
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_admin_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mysql-notification:
    image: mysql:8.0
    container_name: mysql-notification
    networks:
      - ecopria-network
    ports:
      - "3313:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: db_notification
      MYSQL_USER: ecopria
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_notification_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  service-action-backend:
    build: ./backend/service-action
    container_name: service-action-backend
    networks:
      - ecopria-network
    ports:
      - "9090:9090"
    environment:
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    restart: on-failure
    depends_on:
      mysql-action:
        condition: service_healthy