# =============================================================
#  ecopria — Infrastructure complète
#  Kafka KRaft + 9 bases MySQL + tous les microservices
# =============================================================

networks:
  ecopria-network:
    driver: bridge

volumes:
  mysql_auth_data:
  mysql_user_data:
  mysql_action_data:
  mysql_inscription_data:
  mysql_presence_data:
  mysql_recompense_data:
  mysql_admin_data:
  mysql_notification_data:
  kafka_data:

services:

  # ─────────────────────────────────────────────────────────
  #  KAFKA KRaft (sans Zookeeper)
  # ─────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.8.7
    container_name: kafka
    hostname: kafka
    networks:
      - ecopria-network
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      CLUSTER_ID: "ecopria-kafka-cluster-001"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────────────────────
  #  KAFKA UI  → http://localhost:8090
  # ─────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    networks:
      - ecopria-network
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "ecopria-local"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      kafka:
        condition: service_healthy

  # ─────────────────────────────────────────────────────────
  #  PHPMYADMIN  → http://localhost:8888
  # ─────────────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    networks:
      - ecopria-network
    ports:
      - "8888:80"
    environment:
      PMA_HOSTS: mysql-auth,mysql-utilisateur,mysql-action,mysql-inscription,mysql-presence,mysql-recompense,mysql-admin,mysql-notification
      PMA_USER: ecopria
      PMA_PASSWORD: ${MYSQL_PASSWORD}

  # ─────────────────────────────────────────────────────────
  #  BASES DE DONNÉES MySQL — une par microservice
  # ─────────────────────────────────────────────────────────
  mysql-auth:
    image: mysql:8.0
    container_name: mysql-auth
    networks:
      - ecopria-network
    ports:
      - "3316:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: db_auth
      MYSQL_USER: ecopria
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_auth_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mysql-utilisateur:
    image: mysql:8.0
    container_name: mysql-utilisateur
    networks:
      - ecopria-network
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: db_utilisateur
      MYSQL_USER: ecopria
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_user_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mysql-action:
    image: mysql:8.0
    container_name: mysql-action
    networks:
      - ecopria-network
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: db_action
      MYSQL_USER: ecopria
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_action_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mysql-inscription:
    image: mysql:8.0
    container_name: mysql-inscription
    networks:
      - ecopria-network
    ports:
      - "3309:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: db_inscription
      MYSQL_USER: ecopria
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_inscription_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mysql-presence:
    image: mysql:8.0
    container_name: mysql-presence
    networks:
      - ecopria-network
    ports:
      - "3310:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: db_presence
      MYSQL_USER: ecopria
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_presence_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mysql-recompense:
    image: mysql:8.0
    container_name: mysql-recompense
    networks:
      - ecopria-network
    ports:
      - "3311:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: db_recompense
      MYSQL_USER: ecopria
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_recompense_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mysql-admin:
    image: mysql:8.0
    container_name: mysql-admin
    networks:
      - ecopria-network
    ports:
      - "3312:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: db_admin
      MYSQL_USER: ecopria
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_admin_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mysql-notification:
    image: mysql:8.0
    container_name: mysql-notification
    networks:
      - ecopria-network
    ports:
      - "3313:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: db_notification
      MYSQL_USER: ecopria
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_notification_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ─────────────────────────────────────────────────────────
  #  FRONTEND Angular → http://localhost:4200
  # ─────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: frontend
    networks:
      - ecopria-network
    ports:
      - "4200:80"
    depends_on:
      - api-gateway

  # ─────────────────────────────────────────────────────────
  #  API GATEWAY → http://localhost:8080
  # ─────────────────────────────────────────────────────────
  api-gateway:
    build: ./backend/api-gateway
    container_name: api-gateway
    networks:
      - ecopria-network
    ports:
      - "8080:8080"
    environment:
      GATEWAY_UTILISATEUR_URI: http://service-utilisateur-backend:8082
      GATEWAY_NOTIFICATION_URI: http://service-notification-backend:8086
      GATEWAY_ACTION_URI: http://service-action-backend:9090
      GATEWAY_RECOMPENSE_URI: http://service-recompense-backend:9093
      GATEWAY_INSCRIPTION_URI: http://service-inscription-backend:8084
      GATEWAY_PRESENCE_URI: http://service-presence-backend:8085
    restart: on-failure
    depends_on:
      - service-utilisateur-backend
      - service-notification-backend
      - service-action-backend
      - service-recompense-backend
      - service-inscription-backend
      - service-presence-backend
      - service-auth-backend
      - admin-service-backend

  # ─────────────────────────────────────────────────────────
  #  SERVICE AUTH  → port 8081
  # ─────────────────────────────────────────────────────────
  service-auth-backend:
    build: ./backend/auth-service
    container_name: service-auth-backend
    networks:
      - ecopria-network
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-auth:3306/db_auth?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ecopria
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    restart: on-failure
    depends_on:
      mysql-auth:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ─────────────────────────────────────────────────────────
  #  SERVICE UTILISATEUR  → port 8080
  # ─────────────────────────────────────────────────────────
  service-utilisateur-backend:
    build: ./backend/service-utilisateur
    container_name: service-utilisateur-backend
    networks:
      - ecopria-network
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-utilisateur:3306/db_utilisateur?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ecopria
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    restart: on-failure
    depends_on:
      mysql-utilisateur:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ─────────────────────────────────────────────────────────
  #  SERVICE NOTIFICATION  → port 8080 interne / 8086 externe
  # ─────────────────────────────────────────────────────────
  service-notification-backend:
    build: ./backend/service-notification
    container_name: service-notification-backend
    networks:
      - ecopria-network
    ports:
      - "8086:8086"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-notification:3306/db_notification?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ecopria
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EMAIL_USERNAME: ${EMAIL_USERNAME}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      SERVICE_UTILISATEUR_URL: http://service-utilisateur-backend:8082
      SERVICE_INSCRIPTION_URL: http://service-inscription-backend:8084
    restart: on-failure
    depends_on:
      mysql-notification:
        condition: service_healthy
      kafka:
        condition: service_healthy
      service-utilisateur-backend:
        condition: service_started

  # ─────────────────────────────────────────────────────────
  #  SERVICE INSCRIPTION  → port 8084
  # ─────────────────────────────────────────────────────────
  service-inscription-backend:
    build:
      context: ./backend/service-inscription
      dockerfile: Dockerfile
    container_name: service-inscription-backend
    networks:
      - ecopria-network
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-inscription:3306/db_inscription?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ecopria
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SERVICE_ACTION_URL: http://service-action-backend:9090
    restart: on-failure
    depends_on:
      mysql-inscription:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ─────────────────────────────────────────────────────────
  #  SERVICE PRESENCE  → port 8085
  # ─────────────────────────────────────────────────────────
  service-presence-backend:
    build:
      context: ./backend/service-presence
      dockerfile: Dockerfile
    container_name: service-presence-backend
    networks:
      - ecopria-network
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-presence:3306/db_presence?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ecopria
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SERVICE_ACTION_URL: http://service-action-backend:9090
    restart: on-failure
    depends_on:
      mysql-presence:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ─────────────────────────────────────────────────────────
  #  SERVICE ACTION  → port 9090
  # ─────────────────────────────────────────────────────────
  service-action-backend:
    build:
      context: ./backend/service-action
      dockerfile: Dockerfile
    container_name: service-action-backend
    networks:
      - ecopria-network
    ports:
      - "9090:9090"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-action:3306/db_action?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ecopria
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    restart: on-failure
    depends_on:
      mysql-action:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ─────────────────────────────────────────────────────────
  #  SERVICE RECOMPENSE  → port 9093
  # ─────────────────────────────────────────────────────────
  service-recompense-backend:
    build:
      context: ./backend/service-recompense
      dockerfile: Dockerfile
    container_name: service-recompense-backend
    networks:
      - ecopria-network
    ports:
      - "9093:9093"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-recompense:3306/db_recompense?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ecopria
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      UTILISATEUR_SERVICE_URL: http://service-utilisateur-backend:8082
    restart: on-failure
    depends_on:
      mysql-recompense:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ─────────────────────────────────────────────────────────
  #  ADMIN SERVICE  → port 8087
  # ─────────────────────────────────────────────────────────
  admin-service-backend:
    build:
      context: ./backend/admin-service
      dockerfile: Dockerfile
    container_name: admin-service-backend
    networks:
      - ecopria-network
    ports:
      - "8087:8087"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-admin:3306/db_admin?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ecopria
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      AUTH_SERVICE_URL: http://service-auth-backend:8081
      ACTION_SERVICE_URL: http://service-action-backend:9090
      INSCRIPTION_SERVICE_URL: http://service-inscription-backend:8084
      RECOMPENSE_SERVICE_URL: http://service-recompense-backend:9093
      UTILISATEUR_SERVICE_URL: http://service-utilisateur-backend:8082
    restart: on-failure
    depends_on:
      mysql-admin:
        condition: service_healthy
      kafka:
        condition: service_healthy
      service-auth-backend:
        condition: service_started
      service-utilisateur-backend:
        condition: service_started