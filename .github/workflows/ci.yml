name: Ecopria CI/CD

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:

  build-backend:
    name: Backend ${{ matrix.service }}
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: db_test
          MYSQL_USER: ecopria
          MYSQL_PASSWORD: ecopria_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      zookeeper:
        image: confluentinc/cp-zookeeper:7.4.0
        env:
          ZOOKEEPER_CLIENT_PORT: 2181
          ZOOKEEPER_TICK_TIME: 2000
        ports:
          - 2181:2181

      kafka:
        image: confluentinc/cp-kafka:7.4.0
        ports:
          - 9092:9092
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: localhost:2181
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
        options: >-
          --health-cmd="kafka-broker-api-versions --bootstrap-server localhost:9092"
          --health-interval=15s
          --health-timeout=10s
          --health-retries=10
          --health-start-period=40s

    strategy:
      fail-fast: false
      matrix:
        service:
          - service-auth
          - service-utilisateur
          - service-action
          - service-inscription
          - service-presence
          - service-recompense
          - service-admin
          - service-notification
          - api-gateway

    steps:
      - name: Télécharger le code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Vérifier si ce service a été modifié
        id: changes
        run: |
          if git rev-parse HEAD~1 > /dev/null 2>&1; then
            git diff --name-only HEAD~1 HEAD | grep "^backend/${{ matrix.service }}/" \
            && echo "changed=true" >> $GITHUB_OUTPUT \
            || echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Vérifier si le dossier existe
        id: exists
        run: |
          [ -d "backend/${{ matrix.service }}" ] \
          && echo "exists=true" >> $GITHUB_OUTPUT \
          || echo "exists=false" >> $GITHUB_OUTPUT

      - name: Installer Java 21
        if: steps.changes.outputs.changed == 'true' && steps.exists.outputs.exists == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compiler et tester
        if: steps.changes.outputs.changed == 'true' && steps.exists.outputs.exists == 'true'
        working-directory: backend/${{ matrix.service }}
        run: mvn clean package -DskipTests=false
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/db_test
          SPRING_DATASOURCE_USERNAME: ecopria
          SPRING_DATASOURCE_PASSWORD: ecopria_test
          SPRING_KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          JWT_SECRET: test_secret_key_minimum_32_characters_long
          QR_HMAC_SECRET: test_hmac_secret_minimum_32_characters

      - name: Login Docker Hub
        if: steps.changes.outputs.changed == 'true' && steps.exists.outputs.exists == 'true' && github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build et Push image Backend
        if: steps.changes.outputs.changed == 'true' && steps.exists.outputs.exists == 'true' && github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: ./backend/${{ matrix.service }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ecopria-${{ matrix.service }}:latest
            ${{ secrets.DOCKER_USERNAME }}/ecopria-${{ matrix.service }}:${{ github.sha }}

      - name: Afficher le résultat
        if: steps.changes.outputs.changed == 'false' || steps.exists.outputs.exists == 'false'
        run: echo " ${{ matrix.service }} — ignoré"

  build-frontend:
    name: Frontend Angular
    runs-on: ubuntu-latest

    steps:
      - name: Télécharger le code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Vérifier si le frontend a été modifié
        id: changes
        run: |
          if git rev-parse HEAD~1 > /dev/null 2>&1; then
            git diff --name-only HEAD~1 HEAD | grep "^frontend/" \
            && echo "changed=true" >> $GITHUB_OUTPUT \
            || echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Installer Node.js 20
        if: steps.changes.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Installer les dépendances
        if: steps.changes.outputs.changed == 'true'
        working-directory: frontend
        run: npm ci

      - name: Compiler Angular
        if: steps.changes.outputs.changed == 'true'
        working-directory: frontend
        run: npm run build -- --configuration=production

      - name: Login Docker Hub
        if: steps.changes.outputs.changed == 'true' && github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build et Push image Frontend
        if: steps.changes.outputs.changed == 'true' && github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ecopria-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/ecopria-frontend:${{ github.sha }}

      - name: Afficher le résultat
        if: steps.changes.outputs.changed == 'false'
        run: echo " Frontend — aucune modification, ignoré"