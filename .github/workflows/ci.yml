name: Ecopria CI/CD

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:

  build-backend:
    name: Backend ${{ matrix.service }}
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: db_test
          MYSQL_USER: ecopria
          MYSQL_PASSWORD: ecopria_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - service-utilisateur
          - service-action
          - service-inscription
          - service-presence
          - service-recompense
          - admin-service
          - service-notification
          - api-gateway

    steps:
      - name: Télécharger le code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Vérifier si ce service a été modifié
        id: changes
        run: |
          if ! git rev-parse HEAD~1 > /dev/null 2>&1; then
            echo "changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "$CHANGED" | grep -q "^backend/${{ matrix.service }}/" && echo "changed=true" >> $GITHUB_OUTPUT && exit 0
          if [ "${{ matrix.service }}" = "auth-service" ] || [ "${{ matrix.service }}" = "admin-service" ]; then
            echo "$CHANGED" | grep -q "^\.github/workflows/ci\.yml$" && echo "changed=true" >> $GITHUB_OUTPUT && exit 0
          fi
          echo "changed=false" >> $GITHUB_OUTPUT

      - name: Vérifier si le dossier existe
        id: exists
        run: |
          [ -d "backend/${{ matrix.service }}" ] \
          && echo "exists=true" >> $GITHUB_OUTPUT \
          || echo "exists=false" >> $GITHUB_OUTPUT

      - name: Installer Java 21
        if: steps.changes.outputs.changed == 'true' && steps.exists.outputs.exists == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compiler et tester
        if: steps.changes.outputs.changed == 'true' && steps.exists.outputs.exists == 'true'
        working-directory: backend/${{ matrix.service }}
        run: mvn clean package -DskipTests=false
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/db_test
          SPRING_DATASOURCE_USERNAME: ecopria
          SPRING_DATASOURCE_PASSWORD: ecopria_test
          SPRING_PROFILES_ACTIVE: test
          # Empêche service-notification de crasher si EMAIL_USERNAME est vide
          MAIL_ENFORCE: "false"
          # Kafka non disponible en CI : les services qui écoutent doivent être en mode test
          SPRING_KAFKA_BOOTSTRAP_SERVERS: localhost:9092

      - name: Login Docker Hub
        if: steps.changes.outputs.changed == 'true' && steps.exists.outputs.exists == 'true' && github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build et Push image Backend
        if: steps.changes.outputs.changed == 'true' && steps.exists.outputs.exists == 'true' && github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: ./backend/${{ matrix.service }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ecopria-${{ matrix.service }}:latest
            ${{ secrets.DOCKER_USERNAME }}/ecopria-${{ matrix.service }}:${{ github.sha }}

      - name: Afficher le résultat
        if: steps.changes.outputs.changed == 'false' || steps.exists.outputs.exists == 'false'
        run: echo "${{ matrix.service }} — ignoré"

  build-frontend:
    name: Frontend Angular
    runs-on: ubuntu-latest

    steps:
      - name: Télécharger le code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Vérifier si le frontend a été modifié
        id: changes
        run: |
          if git rev-parse HEAD~1 > /dev/null 2>&1; then
            git diff --name-only HEAD~1 HEAD | grep "^frontend/" \
            && echo "changed=true" >> $GITHUB_OUTPUT \
            || echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Installer Node.js 20
        if: steps.changes.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Installer les dépendances
        if: steps.changes.outputs.changed == 'true'
        working-directory: frontend
        run: npm ci

      - name: Compiler Angular
        if: steps.changes.outputs.changed == 'true'
        working-directory: frontend
        run: npm run build -- --configuration=production

      - name: Login Docker Hub
        if: steps.changes.outputs.changed == 'true' && github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build et Push image Frontend
        if: steps.changes.outputs.changed == 'true' && github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ecopria-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/ecopria-frontend:${{ github.sha }}

      - name: Afficher le résultat
        if: steps.changes.outputs.changed == 'false'
        run: echo "Frontend — aucune modification, ignoré"

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]

    steps:
      - name: Télécharger le code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Créer le fichier .env temporaire
        run: |
          echo "MYSQL_ROOT_PASSWORD=root" >> .env
          echo "MYSQL_PASSWORD=ecopria_pass_2026" >> .env
          echo "EMAIL_USERNAME=test@ecopria.com" >> .env
          echo "EMAIL_PASSWORD=test_password" >> .env

      - name: Build images sequentially
        run: |
          set -euxo pipefail
          for svc in api-gateway service-utilisateur-backend service-notification-backend service-action-backend service-inscription-backend service-presence-backend service-recompense-backend admin-service-backend service-auth-backend frontend; do
            echo "=== Building $svc ==="
            docker compose build --progress=plain "$svc"
          done

      - name: Start containers
        run: |
          docker compose up -d

      - name: Attendre le démarrage des services
        run: |
          chmod +x ./scripts/wait-for-services.sh
          ./scripts/wait-for-services.sh

      - name: Exécuter les tests d'intégration basiques
        run: |
          chmod +x ./scripts/test-integration.sh
          ./scripts/test-integration.sh

      - name: Exécuter les tests d'intégration complets
        run: |
          chmod +x ./scripts/test-integration-full.sh
          ./scripts/test-integration-full.sh

      - name: Récupérer les logs des conteneurs en cas d'échec
        if: failure()
        run: |
          docker compose logs