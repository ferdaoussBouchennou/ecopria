# =============================================================
#  Ecopria — CI/CD
#  Sur toutes les branches  → compiler + tester
#  Sur main seulement       → compiler + tester + Docker Hub
# =============================================================

name: Ecopria CI/CD

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:

  # ─────────────────────────────────────────────────────────
  #  TEST ET BUILD — chaque microservice Java
  # ─────────────────────────────────────────────────────────
  build-services:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - service-auth
          - service-utilisateur
          - service-action
          - service-inscription
          - service-presence
          - service-recompense
          - service-admin
          - service-notification
          - api-gateway

    steps:
      - name: Télécharger le code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Vérifier si ce service a été modifié
        id: changes
        run: |
          git diff --name-only HEAD~1 HEAD | grep "^${{ matrix.service }}/" \
          && echo "changed=true" >> $GITHUB_OUTPUT \
          || echo "changed=false" >> $GITHUB_OUTPUT

      - name: Installer Java 21
        if: steps.changes.outputs.changed == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compiler et tester
        if: steps.changes.outputs.changed == 'true'
        working-directory: ${{ matrix.service }}
        run: mvn clean package -DskipTests=false

      # ── Docker Hub : uniquement sur main ──────────────────
      - name: Login Docker Hub
        if: steps.changes.outputs.changed == 'true' && github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build et Push image Docker
        if: steps.changes.outputs.changed == 'true' && github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ecopria-${{ matrix.service }}:latest
            ${{ secrets.DOCKER_USERNAME }}/ecopria-${{ matrix.service }}:${{ github.sha }}

      - name: Afficher le résultat
        if: steps.changes.outputs.changed == 'false'
        run: echo "${{ matrix.service }} — aucune modification détectée, build ignoré"

  # ─────────────────────────────────────────────────────────
  #  TEST ET BUILD — Frontend Angular
  # ─────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend Angular
    runs-on: ubuntu-latest

    steps:
      - name: Télécharger le code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Vérifier si le frontend a été modifié
        id: changes
        run: |
          git diff --name-only HEAD~1 HEAD | grep "^frontend/" \
          && echo "changed=true" >> $GITHUB_OUTPUT \
          || echo "changed=false" >> $GITHUB_OUTPUT

      - name: Installer Node.js 18
        if: steps.changes.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Installer les dépendances
        if: steps.changes.outputs.changed == 'true'
        working-directory: frontend
        run: npm ci

      - name: Compiler Angular
        if: steps.changes.outputs.changed == 'true'
        working-directory: frontend
        run: npm run build -- --configuration=production

      # ── Docker Hub : uniquement sur main ──────────────────
      - name: Login Docker Hub
        if: steps.changes.outputs.changed == 'true' && github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build et Push image Docker Frontend
        if: steps.changes.outputs.changed == 'true' && github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ecopria-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/ecopria-frontend:${{ github.sha }}

      - name: Afficher le résultat
        if: steps.changes.outputs.changed == 'false'
        run: echo "Frontend — aucune modification détectée, build ignoré"