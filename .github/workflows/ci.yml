# =============================================================
#  Ecopria — CI/CD
#  Se déclenche sur toutes les branches
#  Teste uniquement le service qui a été modifié
# =============================================================

name: Ecopria CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:

  # ─────────────────────────────────────────────────────────
  #  TEST ET BUILD — chaque microservice Java
  # ─────────────────────────────────────────────────────────
  build-services:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - service-auth
          - service-utilisateur
          - service-action
          - service-inscription
          - service-presence
          - service-recompense
          - service-admin
          - service-notification
          - api-gateway

    steps:
      - name: Télécharger le code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Vérifier si ce service a été modifié
        id: changes
        run: |
          git diff --name-only HEAD~1 HEAD | grep "^${{ matrix.service }}/" \
          && echo "changed=true" >> $GITHUB_OUTPUT \
          || echo "changed=false" >> $GITHUB_OUTPUT

      - name: Installer Java 21
        if: steps.changes.outputs.changed == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compiler et tester
        if: steps.changes.outputs.changed == 'true'
        working-directory: ${{ matrix.service }}
        run: mvn clean package -DskipTests=false

      - name: Afficher le résultat
        if: steps.changes.outputs.changed == 'false'
        run: echo "${{ matrix.service }} — aucune modification détectée, build ignoré"

  # ─────────────────────────────────────────────────────────
  #  TEST ET BUILD — Frontend Angular
  # ─────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend Angular
    runs-on: ubuntu-latest

    steps:
      - name: Télécharger le code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Vérifier si le frontend a été modifié
        id: changes
        run: |
          git diff --name-only HEAD~1 HEAD | grep "^frontend/" \
          && echo "changed=true" >> $GITHUB_OUTPUT \
          || echo "changed=false" >> $GITHUB_OUTPUT

      - name: Installer Node.js 18
        if: steps.changes.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Installer les dépendances
        if: steps.changes.outputs.changed == 'true'
        working-directory: frontend
        run: npm ci

      - name: Compiler Angular
        if: steps.changes.outputs.changed == 'true'
        working-directory: frontend
        run: npm run build -- --configuration=production

      - name: Afficher le résultat
        if: steps.changes.outputs.changed == 'false'
        run: echo "Frontend — aucune modification détectée, build ignoré"