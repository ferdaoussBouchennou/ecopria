server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

spring:
  application:
    name: service-auth
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3316/db_auth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:ecopria}
    password: ${SPRING_DATASOURCE_PASSWORD:ecopria_pass_2026}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: true

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    listener:
      auto-startup: true  # ACTIVÉ pour écouter les événements Kafka
    admin:
      fail-fast: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

jwt:
  secret: EcopriaProject2026SecretKeyForJwtTokenSigning
  expiration: 86400000
  refresh-expiration: 604800000

admin:
  verification-url: http://localhost:8088/api/admin/verifications

notification:
  service-url: ${SERVICE_NOTIFICATION_URL:http://localhost:8086}

turnstile:
  enabled: ${TURNSTILE_ENABLED:true}
  secret-key: ${TURNSTILE_SECRET_KEY:1x0000000000000000000000000000000AA}
  # Secours local si le navigateur ne charge pas challenges.cloudflare.com (jamais en prod)
  dev-bypass-enabled: ${TURNSTILE_DEV_BYPASS:true}

app:
  email-verification:
    expiration-minutes: ${EMAIL_VERIFICATION_EXPIRATION_MINUTES:15}
    resend-cooldown-seconds: ${EMAIL_VERIFICATION_RESEND_COOLDOWN_SECONDS:60}
  dev:
    log-verification-code: ${LOG_VERIFICATION_CODE:true}
  password-reset:
    expiration-minutes: ${PASSWORD_RESET_EXPIRATION_MINUTES:15}
    resend-cooldown-seconds: ${PASSWORD_RESET_RESEND_COOLDOWN_SECONDS:30}
