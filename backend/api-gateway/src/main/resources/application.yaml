spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - 'http://localhost:4200'
              - 'http://frontend:80'
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: '*'
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: service-utilisateur
          uri: http://service-utilisateur-backend:8080
          predicates:
            - Path=/api/users/**,/api/utilisateurs/**

        - id: service-notification
          uri: http://service-notification-backend:8080
          predicates:
            - Path=/api/notifications/**

        - id: service-action
          uri: http://service-action-backend:9090
          predicates:
            - Path=/api/actions/**,/api/categories/**,/api/associations/**

        - id: service-recompense
          uri: http://service-recompense-backend:9093
          predicates:
            - Path=/api/recompenses/**,/api/partenaire/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: INFO
    reactor.netty: INFO
