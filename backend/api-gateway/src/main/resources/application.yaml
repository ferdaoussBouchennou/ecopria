server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      # Timeouts proxy → microservices (évite les requêtes bloquées indéfiniment)
      httpclient:
        connect-timeout: 5000
        response-timeout: 30s
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - 'http://localhost:4200'
              - 'http://127.0.0.1:4200'
              - 'http://frontend:80'
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders:
              - Authorization
              - Content-Type
              - Accept
              - Origin
              - X-Requested-With
              - Cache-Control
              - X-User-Id
            allowCredentials: true
            maxAge: 3600
      # Configuration pour exécution locale des microservices
      routes:
        - id: service-auth
          uri: ${GATEWAY_AUTH_URI:http://localhost:8081}
          predicates:
            - Path=/api/auth/**

        - id: admin-service
          uri: ${GATEWAY_ADMIN_URI:http://localhost:8087}
          predicates:
            - Path=/admin/**

        - id: service-utilisateur
          uri: ${GATEWAY_UTILISATEUR_URI:http://localhost:8082}
          predicates:
            - Path=/api/users/**,/api/utilisateurs/**

        - id: service-notification
          uri: ${GATEWAY_NOTIFICATION_URI:http://localhost:8086}
          predicates:
            - Path=/api/notifications/**

        - id: service-action
          uri: ${GATEWAY_ACTION_URI:http://localhost:9090}
          predicates:
            - Path=/api/actions/**,/api/categories/**,/api/associations/**,/api/public/**

        - id: service-recompense
          uri: ${GATEWAY_RECOMPENSE_URI:http://localhost:9093}
          predicates:
            - Path=/api/recompenses/**,/api/partenaire/**

        - id: service-inscription
          uri: ${GATEWAY_INSCRIPTION_URI:http://localhost:8084}
          predicates:
            - Path=/inscriptions/**

        - id: service-inscription-api-root
          uri: ${GATEWAY_INSCRIPTION_URI:http://localhost:8084}
          predicates:
            - Path=/api/inscriptions
          filters:
            - SetPath=/inscriptions

        - id: service-inscription-api
          uri: ${GATEWAY_INSCRIPTION_URI:http://localhost:8084}
          predicates:
            - Path=/api/inscriptions/**
          filters:
            - RewritePath=/api/inscriptions/(?<segment>.*), /inscriptions/$\{segment}

        - id: service-presence
          uri: ${GATEWAY_PRESENCE_URI:http://localhost:8085}
          predicates:
            - Path=/presences/**

        - id: service-presence-api-root
          uri: ${GATEWAY_PRESENCE_URI:http://localhost:8085}
          predicates:
            - Path=/api/presences
          filters:
            - SetPath=/presences

        - id: service-presence-api
          uri: ${GATEWAY_PRESENCE_URI:http://localhost:8085}
          predicates:
            - Path=/api/presences/**
          filters:
            - RewritePath=/api/presences/(?<segment>.*), /presences/$\{segment}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

logging:
  level:
    org.springframework.cloud.gateway: INFO
    reactor.netty: INFO
