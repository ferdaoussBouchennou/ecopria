server:
  port: 8084

spring:
  application:
    name: service-inscription

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3309/db_inscription?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:ecopria}
    password: ${SPRING_DATASOURCE_PASSWORD:ecopria_pass_2026}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    listener:
      auto-startup: true  # ACTIVÉ pour écouter les événements Kafka
    admin:
      fail-fast: false

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

    # ← NOUVEAU : config consumer pour écouter action.places.mises.a.jour
    consumer:
      group-id: service-inscription
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.type.mapping: "com.ecopria.action.kafka.event.ActionPlacesUpdatedEvent:com.ecopria.inscription.kafka.ActionPlacesEvent"

service:
  action:
    # Dev local : service-action:9090 | via gateway : http://localhost:8080
    url: ${SERVICE_ACTION_URL:http://localhost:9090}
  presence:
    url: ${SERVICE_PRESENCE_URL:http://localhost:8085}
  utilisateur:
    url: ${SERVICE_UTILISATEUR_URL:http://localhost:8081}