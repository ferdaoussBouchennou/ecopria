server:
  port: 8084

spring:
  application:
    name: service-inscription

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql-inscription:3306/db_inscription?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:ecopria}
    password: ${SPRING_DATASOURCE_PASSWORD:ecopria_pass_2026}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

    # ← NOUVEAU : config consumer pour écouter action.places.mises.a.jour
    consumer:
      group-id: service-inscription
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

service:
  action:
    url: ${SERVICE_ACTION_URL:http://service-action-backend:9090}