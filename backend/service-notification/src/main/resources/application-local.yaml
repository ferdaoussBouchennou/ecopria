# mvn spring-boot:run -Dspring-boot.run.profiles=local
# Charge automatiquement EMAIL_USERNAME / EMAIL_PASSWORD depuis .env à la racine du projet
spring:
  kafka:
    bootstrap-servers: localhost:29092
    listener:
      auto-startup: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME:}
    password: ${EMAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
