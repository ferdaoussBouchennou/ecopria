server:
  port: 8086

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    kafka:
      enabled: false
    mail:
      enabled: false

# Clients HTTP internes (docker-compose : SERVICE_UTILISATEUR_URL, SERVICE_INSCRIPTION_URL)
ecopria:
  mail:
    # Mettre à true uniquement en production (si EMAIL_USERNAME est requis obligatoirement)
    enforce: ${MAIL_ENFORCE:false}
  internal:
    utilisateur-base-url: ${SERVICE_UTILISATEUR_URL:http://localhost:8082}
    inscription-base-url: ${SERVICE_INSCRIPTION_URL:http://localhost:8084}

spring:
  application:
    name: service-notification

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3313/db_notification?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:ecopria}
    password: ${SPRING_DATASOURCE_PASSWORD:ecopria_pass_2026}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    listener:
      auto-startup: true
    admin:
      fail-fast: false
    consumer:
      group-id: notification-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: java.util.Map
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME:}
    password: ${EMAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
