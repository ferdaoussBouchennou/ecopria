<div class="association-layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="association-badge">
        <span class="badge-dot"></span>
        <span class="badge-text">association</span>
      </div>
      <h2 class="association-name">{{ associationName }}</h2>
    </div>

    <nav class="sidebar-nav">
      <button 
        type="button" 
        class="nav-item"
        [class.active]="isActive('/association/tableau-de-bord')"
        (click)="navigateTo('/association/tableau-de-bord')">
        Tableau de bord
      </button>
      <button 
        type="button" 
        class="nav-item"
        [class.active]="isActive('/association/mes-actions')"
        (click)="navigateTo('/association/mes-actions')">
        Mes actions
      </button>
      <button 
        type="button" 
        class="nav-item"
        [class.active]="isActive('/association/creer')"
        (click)="navigateTo('/association/creer')">
        Créer une action
      </button>
      <button 
        type="button" 
        class="nav-item"
        [class.active]="isActive('/association/participants')"
        (click)="navigateTo('/association/participants')">
        Participants
      </button>
      <button 
        type="button" 
        class="nav-item"
        [class.active]="isActive('/association/scanner')"
        (click)="navigateTo('/association/scanner')">
        Scanner
      </button>
    </nav>

    <div class="sidebar-footer">
      <button type="button" class="btn-logout" (click)="logout()">
        Déconnexion
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <router-outlet />
  </main>
</div>
