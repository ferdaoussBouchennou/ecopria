<div class="partenaire-layout">

  <aside class="sidebar" [class.sidebar--open]="sidebarOpen">
    <div class="sidebar-header">
      <button class="sidebar-close" type="button" (click)="sidebarOpen = false" aria-label="Fermer le menu">×</button>
      <img class="sidebar-logo" src="assets/logo.png" alt="Ecopria" />
      <p class="sidebar-badge">Espace partenaire</p>
      <h2 class="commerce-name">{{ profil?.name || 'Mon établissement' }}</h2>
      <p class="commerce-category" *ngIf="profil?.category as category">{{ category }}</p>
    </div>

    <nav class="sidebar-nav">
      <a
        routerLink="/partenaire"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav-item"
      >
        <svg class="nav-icon" width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <rect x="3" y="3" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/>
          <rect x="11" y="3" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/>
          <rect x="3" y="11" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/>
          <rect x="11" y="11" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/>
        </svg>
        <span>Tableau de bord</span>
      </a>
      <a routerLink="/partenaire/offres" routerLinkActive="active" class="nav-item">
        <svg class="nav-icon" width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M4 6H16V14C16 15.1046 15.1046 16 14 16H6C4.89543 16 4 15.1046 4 14V6Z" stroke="currentColor" stroke-width="1.5"/>
          <path d="M4 8H16" stroke="currentColor" stroke-width="1.5"/>
        </svg>
        <span>Mes offres</span>
      </a>
      <a routerLink="/partenaire/scanner" routerLinkActive="active" class="nav-item">
        <svg class="nav-icon" width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <rect x="4" y="3" width="12" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/>
          <path d="M8 14H12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>Scanner coupon</span>
      </a>
      <a routerLink="/partenaire/avis" routerLinkActive="active" class="nav-item">
        <svg class="nav-icon" width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M10 3L12.1 7.6L17 8.3L13.5 11.8L14.3 17L10 14.5L5.7 17L6.5 11.8L3 8.3L7.9 7.6L10 3Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
        <span>Avis clients</span>
      </a>
      <a routerLink="/partenaire/visibilite" routerLinkActive="active" class="nav-item">
        <svg class="nav-icon" width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M3 14L8 6L12 10L17 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Visibilité</span>
      </a>
      <a routerLink="/partenaire/commissions" routerLinkActive="active" class="nav-item">
        <svg class="nav-icon" width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5"/>
          <path d="M10 6V10L12.5 12.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>Commissions</span>
      </a>
      <a routerLink="/partenaire/profil" routerLinkActive="active" class="nav-item">
        <svg class="nav-icon" width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <circle cx="10" cy="7" r="3.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M4 17C4 13.6863 6.68629 11 10 11C13.3137 11 16 13.6863 16 17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>Mon profil</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button type="button" class="btn-logout" (click)="logout()">Déconnexion</button>
    </div>
  </aside>

  <div class="sidebar-overlay" *ngIf="sidebarOpen" (click)="sidebarOpen = false"></div>

  <main class="main-content">
    <header class="top-navbar">
      <button type="button" class="topbar-menu" (click)="sidebarOpen = true" aria-label="Ouvrir le menu">
        <span></span><span></span><span></span>
      </button>
      <div class="navbar-left">
        <p class="navbar-caption">Pilotage partenaire</p>
      </div>
      <div class="navbar-right" *ngIf="profil">
        <a routerLink="/partenaire/profil" class="navbar-profile">
          <div class="profile-avatar">
            <img *ngIf="profil.imageUrl" [src]="profil.imageUrl" [alt]="profil.name" />
            <span *ngIf="!profil.imageUrl">{{ getInitials(profil.name) }}</span>
          </div>
          <span class="profile-name">{{ profil.name }}</span>
        </a>
      </div>
    </header>

    <div class="partenaire-page">
      <router-outlet />
    </div>
  </main>
</div>
