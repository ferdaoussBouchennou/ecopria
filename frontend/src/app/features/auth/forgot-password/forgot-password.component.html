<section class="auth-page">
  <div class="auth-layout auth-layout--narrow">
    <div class="auth-form-col">
      <p class="auth-eyebrow"><span class="eyebrow-line"></span> Mot de passe oublié</p>
      <h1 class="auth-title">Récupérer l'accès.</h1>
      <p class="auth-sub">Nous vous enverrons un code sécurisé par e-mail.</p>

      @if (error) {
        <div class="alert alert--error" role="alert">{{ error }}</div>
      }

      <form class="auth-form" (ngSubmit)="submit()" novalidate>
        <label class="field">
          <span>Email</span>
          <input
            type="email"
            name="email"
            [(ngModel)]="email"
            required
            placeholder="vous@exemple.com"
            autocomplete="email"
          />
        </label>

        <button type="submit" class="btn-submit" [disabled]="submitting">
          {{ submitting ? 'Envoi…' : 'Envoyer le code' }}
        </button>

        <a routerLink="/connexion" class="back-link">← Retour à la connexion</a>
      </form>
    </div>
  </div>
</section>
