<section class="auth-page">
  <div class="auth-layout auth-layout--narrow">
    <div class="auth-form-col">
      <p class="auth-eyebrow"><span class="eyebrow-line"></span> Nouveau mot de passe</p>
      <h1 class="auth-title">Choisissez un mot de passe.</h1>
      <p class="auth-sub">{{ passwordPolicyHint }}</p>

      @if (success) {
        <div class="alert alert--success" role="status">
          Mot de passe mis à jour. Redirection vers la connexion…
        </div>
      } @else {
        <form class="auth-form" (ngSubmit)="submit()" novalidate>
          <label class="field field--password">
            <span>Nouveau mot de passe</span>
            <div class="password-input-wrap">
              <input
                [type]="showPassword ? 'text' : 'password'"
                name="password"
                [(ngModel)]="password"
                required
                [placeholder]="passwordPolicyHint"
                autocomplete="new-password"
              />
              <button
                type="button"
                class="password-toggle"
                (click)="togglePasswordVisibility('password')"
                [attr.aria-label]="showPassword ? 'Masquer le mot de passe' : 'Afficher le mot de passe'"
              >
                @if (showPassword) {
                  <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M12 6a9.77 9.77 0 0 1 8.82 5.5 9.647 9.647 0 0 1-2.41 3.12l1.41 1.41A11.94 11.94 0 0 0 24 11.5 12 12 0 0 0 0 11.5a12 12 0 0 0 3.27 8.41l1.42-1.42A9.77 9.77 0 0 1 12 6Zm0 4a3 3 0 0 0-2.83 4h5.66A3 3 0 0 0 12 10Zm-7.53 1.47-1.41 1.41A12 12 0 0 0 0 11.5 12 12 0 0 0 12 24a11.8 11.8 0 0 0 7.53-2.73l-1.41-1.41A9.77 9.77 0 0 1 12 20a9.77 9.77 0 0 1-7.53-8.53Z"/></svg>
                } @else {
                  <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5C21.27 7.61 17 4.5 12 4.5Zm0 12.5a5 5 0 1 1 0-10 5 5 0 0 1 0 10Zm0-2a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/></svg>
                }
              </button>
            </div>
          </label>

          <label class="field field--password">
            <span>Confirmer le mot de passe</span>
            <div class="password-input-wrap">
              <input
                [type]="showConfirmPassword ? 'text' : 'password'"
                name="confirmPassword"
                [(ngModel)]="confirmPassword"
                required
                placeholder="Répétez le mot de passe"
                autocomplete="new-password"
              />
              <button
                type="button"
                class="password-toggle"
                (click)="togglePasswordVisibility('confirm')"
                [attr.aria-label]="showConfirmPassword ? 'Masquer la confirmation' : 'Afficher la confirmation'"
              >
                @if (showConfirmPassword) {
                  <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M12 6a9.77 9.77 0 0 1 8.82 5.5 9.647 9.647 0 0 1-2.41 3.12l1.41 1.41A11.94 11.94 0 0 0 24 11.5 12 12 0 0 0 0 11.5a12 12 0 0 0 3.27 8.41l1.42-1.42A9.77 9.77 0 0 1 12 6Zm0 4a3 3 0 0 0-2.83 4h5.66A3 3 0 0 0 12 10Zm-7.53 1.47-1.41 1.41A12 12 0 0 0 0 11.5 12 12 0 0 0 12 24a11.8 11.8 0 0 0 7.53-2.73l-1.41-1.41A9.77 9.77 0 0 1 12 20a9.77 9.77 0 0 1-7.53-8.53Z"/></svg>
                } @else {
                  <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5C21.27 7.61 17 4.5 12 4.5Zm0 12.5a5 5 0 1 1 0-10 5 5 0 0 1 0 10Zm0-2a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/></svg>
                }
              </button>
            </div>
          </label>

          @if (error) {
            <div class="alert alert--error" role="alert">{{ error }}</div>
          }

          <button type="submit" class="btn-submit" [disabled]="submitting || !resetToken">
            {{ submitting ? 'Enregistrement…' : 'Enregistrer le mot de passe' }}
          </button>

          <a routerLink="/connexion" class="back-link">← Retour à la connexion</a>
        </form>
      }
    </div>
  </div>
</section>
