<section class="auth-page">
  <div class="auth-layout auth-layout--login">
    <div class="auth-visual" aria-hidden="true">
      <div class="auth-visual__frame auth-visual__frame--login">
        <div class="auth-visual__caption">
          <h2>Rejoignez le mouvement.</h2>
          <p>Des actions concrètes pour un avenir plus vert, près de chez vous.</p>
        </div>
      </div>
    </div>

    <div class="auth-form-col">
      <p class="auth-eyebrow"><span class="eyebrow-line"></span> Bon retour</p>
      <h1 class="auth-title">Se connecter.</h1>
      <p class="auth-sub">Reprenez votre parcours là où vous l'aviez laissé.</p>

      @if (error) {
        <div class="alert alert--error" role="alert">{{ error }}</div>
      }

      <form class="auth-form" (ngSubmit)="submit()" novalidate>
        <label class="field">
          <span>Email</span>
          <input
            id="login-email"
            type="email"
            name="email"
            [(ngModel)]="email"
            required
            placeholder="vous@exemple.com"
            autocomplete="email"
          />
        </label>

        <label class="field">
          <span>Mot de passe</span>
          <input
            id="login-password"
            type="password"
            name="password"
            [(ngModel)]="password"
            required
            placeholder="••••••••"
            autocomplete="current-password"
          />
        </label>

        <div class="form-row-options">
          <a routerLink="/mot-de-passe-oublie" class="forgot-link">Mot de passe oublié ?</a>
        </div>

        <button type="submit" class="btn-submit" [disabled]="submitting">
          {{ submitting ? 'Connexion…' : 'Se connecter' }}
        </button>

        <p class="auth-footer-hint">
          Pas encore de compte ?
          <a routerLink="/creer-compte" [queryParams]="authQueryParams">Créer un compte</a>
        </p>
      </form>
    </div>
  </div>
</section>
