
<div class="form-grid">
  <section class="form-section">
    <div style="display: flex; align-items: center; gap: 2rem; margin-bottom: 2.5rem;">
      <div class="avatar-edit-wrapper">
        <div class="avatar-large">
          <img *ngIf="photo" [src]="photo" alt="Profile">
          <span *ngIf="!photo">{{ firstName.charAt(0) }}{{ lastName.charAt(0) }}</span>
        </div>
        <!-- Input file caché -->
        <input type="file" #fileInput (change)="onFileSelected($event)" accept="image/*" style="display: none;">
        <button class="edit-overlay" (click)="fileInput.click()">Changer la photo</button>
      </div>
      <div>
        <h2 style="margin: 0;">{{ firstName }} {{ lastName }}</h2>
      </div>
    </div>

    <div class="input-group">
      <label>Prénom</label>
      <input type="text" [(ngModel)]="firstName" placeholder="Camille">
    </div>

    <div class="input-group">
      <label>Nom</label>
      <input type="text" [(ngModel)]="lastName" placeholder="Renard">
    </div>

    <div class="input-group">
      <label>Email</label>
      <input type="text" [(ngModel)]="email" placeholder="camille@exemple.com">
    </div>

    <div class="input-group">
      <label>Adresse / Ville</label>
      <input type="text" [(ngModel)]="city" placeholder="14 rue des Tilleuls, Lyon">
    </div>

    <button class="btn-save" (click)="saveProfile()">Enregistrer les modifications</button>
    <p *ngIf="message" style="margin-top: 1rem; color: var(--primary); font-weight: 600;">{{ message }}</p>
  </section>

  <section class="form-section">
    <h2>Notifications</h2>
    
    <div class="toggle-item">
      <p>Nouvelles actions près de chez moi</p>
      <label class="switch">
        <input type="checkbox" [(ngModel)]="prefs.nearbyActions" (change)="savePreferences()">
        <span class="slider"></span>
      </label>
    </div>

    <div class="toggle-item">
      <p>Rappels avant une action</p>
      <label class="switch">
        <input type="checkbox" [(ngModel)]="prefs.reminders" (change)="savePreferences()">
        <span class="slider"></span>
      </label>
    </div>

    <div class="toggle-item">
      <p>Nouveautés du catalogue</p>
      <label class="switch">
        <input type="checkbox" [(ngModel)]="prefs.catalogNews" (change)="savePreferences()">
        <span class="slider"></span>
      </label>
    </div>

    <div class="toggle-item">
      <p>Newsletter mensuelle</p>
      <label class="switch">
        <input type="checkbox" [(ngModel)]="prefs.newsletter" (change)="savePreferences()">
        <span class="slider"></span>
      </label>
    </div>
  </section>
</div>
