<div class="partenaire-layout">
  <aside class="partenaire-sidebar">
    <div class="sidebar-brand">
      <a routerLink="/actions" class="brand">
        <img src="assets/logo.png" alt="Ecopria" class="brand-logo">
        <span class="brand-mark">ecopria</span>
      </a>
      <span class="sidebar-badge">Partenaire</span>
    </div>

    <div class="sidebar-identity">
      <h2 class="commerce-name">{{ partenaireName }}</h2>
      <span class="commerce-role" *ngIf="!loadingName">Ambassadeur Ecopria</span>
      <p class="commerce-note">Suivez vos offres, votre visibilité et les retours clients dans un espace plus direct.</p>
    </div>

    <nav class="sidebar-nav">
      <a
        *ngFor="let item of navItems"
        [routerLink]="item.path"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: item.exact }"
        class="nav-link">
        {{ item.label }}
      </a>
    </nav>

    <div class="sidebar-panel">
      <span class="panel-label">Priorité</span>
      <strong>Mettre en avant vos offres les plus consultées</strong>
    </div>
  </aside>

  <div class="partenaire-content">
    <header class="partenaire-topbar">
      <div>
        <span class="topbar-commerce">{{ partenaireName }}</span>
        <p class="topbar-caption">Espace partenaire Ecopria</p>
      </div>
      <div class="topbar-user">
        <span class="topbar-name">Camille R.</span>
        <span class="topbar-avatar">CR</span>
      </div>
    </header>
    <main class="partenaire-main">
      <router-outlet />
    </main>
  </div>
</div>
