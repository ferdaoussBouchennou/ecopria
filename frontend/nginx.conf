server {
    listen 80;

    # API Gateway (auth, users, actions, etc.)
    location /api/ {
        proxy_pass http://api-gateway:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Pages Angular admin (refresh F5) — avant le proxy API /admin/
    location = /admin {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }
    location ~ ^/admin/(comptes|actions-fixes|moderation|categories|associations|users|configurations)/?$ {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    location /admin/ {
        proxy_pass http://api-gateway:8080/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Images uploadées (service-recompense via API Gateway)
    location /uploads/ {
        proxy_pass http://api-gateway:8080/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
